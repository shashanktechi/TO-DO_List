<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Manager</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="task-page">

    <!-- TOP BUTTONS -->

    <div class="top-actions">

        <a href="dashboard.html" class="dashboard-btn">
            📊 Dashboard
        </a>

        <a href="profile.html" class="dashboard-btn">
            👤 Profile
        </a>

    </div>

    <!-- HEADER -->

    <div class="task-header">

        <h1>📋 Task Manager</h1>

        <p class="task-subtitle">
            Organize your work efficiently
        </p>

    </div>

    <!-- ADD TASK FORM -->

    <div class="add-task-box">

        <input
            type="text"
            id="taskInput"
            placeholder="Task Title">

        <textarea
            id="description"
            placeholder="Task Description"></textarea>

        <select id="priority">

            <option value="High">
                🔥 High Priority
            </option>

            <option value="Medium">
                ⚡ Medium Priority
            </option>

            <option value="Low">
                🌱 Low Priority
            </option>

        </select>

        <input
            type="datetime-local"
            id="dueDate">

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <!-- TASK LIST -->

    <div id="taskList" class="task-grid"></div>

</div>

<script src="js/script.js"></script>

</body>
</html>
